<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141c2b"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="kLeft" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4dd9e8"/>
      <stop offset="50%" stop-color="#2bb8d6"/>
      <stop offset="100%" stop-color="#1a8aaf"/>
    </linearGradient>
    <linearGradient id="kRight" x1="0.7" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8899aa"/>
      <stop offset="50%" stop-color="#5a6a7a"/>
      <stop offset="100%" stop-color="#3a4a5a"/>
    </linearGradient>
    <linearGradient id="kMid" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3ccce0"/>
      <stop offset="100%" stop-color="#6a7a8a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle glow under the K -->
  <ellipse cx="300" cy="340" rx="120" ry="20" fill="#2bbad6" opacity="0.15" filter="url(#glow)"/>

  <!-- K letter - left vertical bar -->
  <polygon points="180,120 230,120 230,370 180,370" fill="url(#kLeft)"/>

  <!-- K letter - upper diagonal (going right-up from center) -->
  <polygon points="230,245 230,200 380,120 420,120 420,155" fill="url(#kMid)"/>

  <!-- K letter - lower diagonal (going right-down from center) -->
  <polygon points="230,245 230,290 420,370 420,335 380,370" fill="url(#kRight)"/>

  <!-- K letter - upper arm tip -->
  <polygon points="380,120 420,120 420,155 370,155" fill="url(#kLeft)" opacity="0.9"/>

  <!-- K letter - lower arm -->
  <polygon points="230,260 420,370 420,330 230,230" fill="url(#kRight)"/>

  <!-- K letter - upper arm -->
  <polygon points="230,230 420,120 420,160 230,260" fill="url(#kLeft)" opacity="0.85"/>

  <!-- Center highlight slash -->
  <polygon points="270,180 310,180 260,310 220,310" fill="#2dd5ea" opacity="0.12"/>

  <!-- KEUGEN text -->
  <text x="300" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="8" filter="url(#textGlow)">KEUGEN</text>

  <!-- GAMES text -->
  <text x="300" y="485" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="32" font-weight="400" fill="#3ccce0" letter-spacing="14">GAMES</text>
</svg>

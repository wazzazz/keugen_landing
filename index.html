<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keugen Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
            background: #0f1520;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        nav a {
            margin-left: 32px;
            text-decoration: none;
            color: #8899aa;
            font-size: 15px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #3ccce0;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 60px 24px 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-logo {
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 20px;
            color: #fff;
        }

        .hero p {
            font-size: 18px;
            color: #8899aa;
            line-height: 1.6;
            max-width: 560px;
            margin-bottom: 36px;
        }

        .cta {
            display: inline-block;
            background: linear-gradient(135deg, #2bbad6, #1a8aaf);
            color: #fff;
            padding: 14px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .cta:hover {
            opacity: 0.85;
        }

        footer {
            text-align: center;
            padding: 40px 24px;
            color: #556;
            font-size: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        @media (max-width: 600px) {
            header {
                padding: 16px 20px;
            }

            .hero {
                padding: 40px 20px;
            }

            .hero-logo {
                width: 220px;
                height: 220px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Keugen Games</div>
        <nav>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <img class="hero-logo" src="logo.svg" alt="Keugen Games">
        <h1>Welcome to Keugen Games</h1>
        <p>We create games that inspire. Stay tuned for what's coming next.</p>
        <a href="#contact" class="cta">Get in Touch</a>
    </section>

    <footer>
        &copy; 2026 Keugen Games. All rights reserved.
    </footer>
</body>
</html>

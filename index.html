<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keugen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        nav a {
            margin-left: 32px;
            text-decoration: none;
            color: #555;
            font-size: 15px;
        }

        nav a:hover {
            color: #1a1a1a;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 80px 24px 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 52px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            max-width: 560px;
            margin-bottom: 36px;
        }

        .cta {
            display: inline-block;
            background: #1a1a1a;
            color: #fff;
            padding: 14px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .cta:hover {
            background: #333;
        }

        .hero-image {
            margin-top: 60px;
            width: 100%;
            max-width: 720px;
        }

        .hero-image img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        footer {
            text-align: center;
            padding: 40px 24px;
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            header {
                padding: 16px 20px;
            }

            .hero {
                padding: 48px 20px 40px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Keugen</div>
        <nav>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to Keugen</h1>
        <p>Simple, modern, and ready to go. This is just the beginning.</p>
        <a href="#contact" class="cta">Get Started</a>
        <div class="hero-image">
            <img src="hero.svg" alt="Keugen hero image">
        </div>
    </section>

    <footer>
        &copy; 2026 Keugen. All rights reserved.
    </footer>
</body>
</html>
